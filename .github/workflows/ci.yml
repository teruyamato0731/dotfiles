name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  docker-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/teruyamato0731/dotfiles
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./.devcontainer/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  devcontainer:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run in Dev Container
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            ln -s "$PWD" "$HOME/dotfiles"
            ./install.sh
            echo "::group::Re-run installer to verify idempotency"
            ./install.sh
            echo "::endgroup::"
            test -x "$HOME/.local/bin/mise"

  host:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Link checkout
        run: ln -s "${GITHUB_WORKSPACE}" "${HOME}/dotfiles"

      - name: Run on Host
        run: |
          ./install.sh host

      - name: Verify installation
        run: |
          set -euo pipefail

          mise="${HOME}/.local/bin/mise"
          test -x "${mise}"
          "${mise}" --version

          gh_bin="$("${mise}" -C "${HOME}" which gh)"
          test -x "${gh_bin}"
          "${gh_bin}" --version

          test -s "${HOME}/.local/share/bash-completion/completions/gh"
          test -f "${HOME}/.local/share/fonts/MoralerspaceNeon-Regular.ttf"
          test -f "${HOME}/.local/share/fonts/MoralerspaceNeonHW-Regular.ttf"
