min_version = "2026.7.6"

[settings]
experimental = true
disable_backends = ["asdf", "vfox"]
minimum_release_age = "7d"
dotfiles.root = "~/dotfiles"
dotfiles.default_mode = "symlink"

[bootstrap.repos]
"~/.local/share/zsh/plugins/zsh-autosuggestions" = { url = "https://github.com/zsh-users/zsh-autosuggestions.git" }
"~/.local/share/zsh/plugins/zsh-syntax-highlighting" = { url = "https://github.com/zsh-users/zsh-syntax-highlighting.git" }

[dotfiles]
"~/.profile/mise-activate" = { block = '''
if command -v mise >/dev/null 2>&1; then
  eval "$(mise activate bash --shims)"
fi
''' }
"~/.bashrc/custom" = { block = '''
if [ -f ~/.bashrc.custom ]; then
  source ~/.bashrc.custom
fi
''' }
"~/.bashrc.custom" = "~/dotfiles/.config/bash/.bashrc.custom"
"~/.gitconfig.custom" = "~/dotfiles/.config/git/.gitconfig.custom"
"~/.zshenv" = "~/dotfiles/.config/zshenv"
"~/.config/git" = {}
"~/.config/yazi" = {}
"~/.config/wezterm" = {}
"~/.config/zsh" = {}
"~/.config/starship.toml" = {}

[env]
_.path = ["{{env.HOME}}/dotfiles/bin"]
MANPAGER = "bat -plman"
VISUAL = "edit"
EDITOR = "edit"

FZF_DEFAULT_COMMAND = "fd --type f --hidden --exclude .git"
FZF_CTRL_T_COMMAND = "fd --hidden --exclude .git"
FZF_ALT_C_COMMAND = "fd --type d --hidden --exclude .git"
FZF_DEFAULT_OPTS = "--height 70% --layout reverse --border"
FZF_CTRL_T_OPTS = "--preview \"bat -n --color=always {} 2> /dev/null || tree -C {}\""
FZF_ALT_C_OPTS = "--preview \"tree --gitignore -C {}\""

[shell_alias]
ls = 'ls --color=auto'
ll = 'ls -alF'
grep = 'grep --color=auto'
cat = 'bat --paging=never'

[tools]
"aqua:BurntSushi/ripgrep" = "15.1.0"
"aqua:ClementTsang/bottom" = "0.14.1"
"aqua:astral-sh/uv" = "0.11.23"
"aqua:cli/cli" = "2.96.0"
"aqua:jdx/usage" = "3.5.2"
"aqua:junegunn/fzf" = "0.73.1"
"aqua:microsoft/edit" = "2.0.0"
"aqua:sharkdp/bat" = "0.26.1"
"aqua:sharkdp/fd" = "10.4.2"
"aqua:starship/starship" = "1.26.0"
"aqua:sxyazi/yazi" = "26.5.6"
"aqua:x-motemen/ghq" = "1.10.1"
